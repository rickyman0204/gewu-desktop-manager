<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Launcher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    .launcher {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      -webkit-app-region: drag;
    }

    .btn {
      width: 44px; height: 44px;
      border-radius: 14px;
      background: rgba(108, 92, 231, 0.82);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 22px;
      font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        0 4px 16px rgba(108, 92, 231, 0.35),
        0 0 0 1px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.15);
      line-height: 1;
    }
    .btn:hover {
      background: rgba(108, 92, 231, 0.95);
      transform: scale(1.08);
      box-shadow:
        0 6px 24px rgba(108, 92, 231, 0.5),
        0 0 0 1px rgba(0, 0, 0, 0.1),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    .btn:active {
      transform: scale(0.95);
      box-shadow:
        0 2px 8px rgba(108, 92, 231, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .tooltip {
      position: fixed;
      top: 52px; left: 50%;
      transform: translateX(-50%);
      background: rgba(28, 28, 42, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.7);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn:hover + .tooltip { opacity: 1; }
  </style>
</head>
<body>
  <div class="launcher">
    <button class="btn" onclick="createZone()">+</button>
    <div class="tooltip">新建桌面分区</div>
  </div>

  <script>
    async function createZone() {
      await window.zoneAPI.createZone();
    }
  </script>
</body>
</html>
